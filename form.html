<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD131 | Product Review | Fabian Reyes</title>
    <meta name="author" content="Fabian Reyes">
    <meta name="description" content="WWD131. Product Review Form Page. Applying good form design principles.">
    <link rel="stylesheet" href="styles/form-small.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
        <p>We value your feedback. Please let us know how your product is performing.</p>
    </header>
    <main>
        <form action="review.html" method="get" class="review-form">
            <fieldset>
                <legend>Product Selection</legend>
                <label for="product-name">Product Name<span class="required">*</span>
                    <select name="productname" id="product-name" required>
                        <option value="" disabled selected>Select a Product ...</option>
                    </select>
                </label>
            </fieldset>

            <fieldset>
                <legend>Product Rating & Features</legend>

                <div>Overall Rating <span class="required">*</span></div>
                <label for="rating-1"><input type="radio" id="rating-1" name="overallRating" value="1" required> 1 ☆</label>
                <label for="rating-2"><input type="radio" id="rating-2" name="overallRating" value="2" required> 2 ☆</label>
                <label for="rating-3"><input type="radio" id="rating-3" name="overallRating" value="3" required> 3 ☆</label>
                <label for="rating-4"><input type="radio" id="rating-4" name="overallRating" value="4" required> 4 ☆</label>
                <label for="rating-5"><input type="radio" id="rating-5" name="overallRating" value="5" required> 5 ☆</label>
            
                <label for="install-date">Date of Installation <span class="required">*</span></label>
                <input type="date" id="install-date" name="installDate" required>
            
                <div>Useful Features (Check all that apply)</div>
                <label for="feature-durability"><input type="checkbox" id="feature-durability" name="features" value="durability">Durability</label>
                <label for="feature-ease"><input type="checkbox" id="feature-ease" name="features" value="easeOfUse">Ease of Use</label>
                <label for="feature-performance"><input type="checkbox" id="feature-performance" name="features" value="performance">Performance</label>
                <label for="feature-design"><input type="checkbox" id="feature-design" name="features" value="design">Design</label>
            </fieldset>

            <fieldset>
                <legend>Reviewer Details</legend>
                <label for="written-review">Written Review <span class="optional">(Optional)</span></label>
                <textarea name="writtenReview" id="written-review" rows="5" placeholder="Write your review here..."></textarea>
            
                <label for="user-name">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="user-name" name="userName">
            </fieldset>

            <input type="submit" value="Submit Review" id="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy;<span id="currentYear"></span> 🌵 Fabian Reyes 🌵 Chile</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>

</body>
</html>
